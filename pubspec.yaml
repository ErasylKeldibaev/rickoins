name: rickoins
description: "Rickoins Flutter project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.10
  firebase_storage: ^12.3.2
  cloud_firestore: ^5.6.5

  # 🌐 API (Rick & Morty)
  dio: ^5.4.3+1

  # 📦 State
  provider: ^6.1.2

  # 🖼 UI
  lottie: ^3.1.2
  cached_network_image: ^3.4.1

  # 📂 Files / Links
  file_picker: ^8.0.3
  url_launcher: ^6.2.5
  image_picker: ^1.1.0
  pdfx: ^2.6.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/